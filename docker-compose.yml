services:
  db:
    image: postgres:16
    container_name: socratic_forge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: socratic
      POSTGRES_PASSWORD: socratic
      POSTGRES_DB: socratic_forge
    ports:
      - "5432:5432"
    volumes:
      - socratic_forge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socratic -d socratic_forge"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  socratic_forge_pgdata:

